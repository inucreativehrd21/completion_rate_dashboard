name: Build & Release

# v로 시작하는 태그를 push할 때만 동작 (일반 커밋 push로는 배포되지 않음)
#   예) git tag v1.0.1 && git push origin v1.0.1
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write   # GitHub Release 생성/업로드용
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build & publish (electron-builder)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish
